<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PingPad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <aside class="sidebar">
        <h1>🎯 PingPad</h1>

        <input type="email" id="emailInput" placeholder="Email" class="input-field">
        <input type="password" id="passwordInput" placeholder="Пароль" class="input-field">

        <button id="loginBtn" class="btn">Вход</button>
        <button id="registerBtn" class="btn">Регистрация</button>
        <button id="logoutBtn" class="btn" style="display:none;">Выход</button>

        <div id="conversationsSection" style="display:none;">
            <button id="newChatBtn" class="btn">+ Новый чат</button>
            <div id="conversationsList"></div>
        </div>
    </aside>

    <main>
        <div id="loginPrompt">
            <h2>Добро пожаловать в PingPad</h2>
        </div>

        <div id="chatContainer" style="display:none;">
            <h2 id="chatTitle">Выбери чат</h2>

            <div id="messagesArea"></div>

            <div class="input-area">
                <input id="messageInput" placeholder="Сообщение..." class="input-field">
                <button id="sendBtn" class="btn">Отправить</button>
            </div>
        </div>
    </main>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
